server:
  port: ${SERVER_PORT}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 30MB

  web:
    resources:
      static-locations:
        - file:./uploads/
        - classpath:/static/

# ---- AI (Gemini) ----
gemini:
  api:
    key: ${YOUR_GEMINI_API_KEY}
    url: ${API_URL}

# ---- App Config ----
app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173

  matching:
    max-results: 5
    default-radius-km: 20

  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

  upload:
    dir: ./uploads

# ---- Logging ----
logging:
  level:
    com:
      hackathon: DEBUG
    org:
      springframework:
        web: INFO