server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/resource_allocation
    username: postgres
    password: root123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 30MB

  web:
    resources:
      static-locations:
        - file:./uploads/
        - classpath:/static/

# ---- AI (Gemini) ----
gemini:
  api:
    key: AQ.Ab8RN6ITRICbXBO7PzLuaCM5oNm0BmFq35FcB5QjmVeTG59q1A
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# ---- App Config ----
app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173

  matching:
    max-results: 5
    default-radius-km: 20

  jwt:
    secret: 3f8a2b1c9d4e7f6a5b0c8d2e1f4a3b9c7d6e5f2a1b0c8d4e3f2a1b9c8d7e6f5
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

  upload:
    dir: ./uploads

# ---- Logging ----
logging:
  level:
    com:
      hackathon: DEBUG
    org:
      springframework:
        web: INFO